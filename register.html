<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduInsight - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h2>📝 Create Account</h2>
                <p id="roleText">Register as Student</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" title="Full Name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">📧 Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email address" title="Email Address" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>🔒 Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" title="Password" required>
                    </div>
                    <div class="form-group">
                        <label>✓ Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" title="Confirm Password" required>
                    </div>
                </div>
                
                <!-- Student Specific Fields -->
                <div id="studentFields">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="stream">🎓 Stream</label>
                            <select class="form-control" id="stream" title="Stream">
                                <option>Science</option>
                                <option>Commerce</option>
                                <option>Arts</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="gender">⚥ Gender</label>
                            <select class="form-control" id="gender" title="Gender">
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="age">📅 Age</label>
                        <input type="number" class="form-control" id="age" placeholder="Enter your age" title="Age">
                    </div>
                </div>
                
                <!-- Teacher Specific Fields (Hidden by default) -->
                <div id="teacherFields" class="hidden-section">
                    <div class="form-group">
                        <label>🏫 Department</label>
                        <input type="text" class="form-control" id="department" placeholder="e.g., Computer Science">
                    </div>
                    <div class="form-group">
                        <label>📖 Subject</label>
                        <input type="text" class="form-control" id="subject" placeholder="e.g., Mathematics">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mt-20">Register →</button>
            </form>
            
            <div class="register-link text-center-mt20">
                <a href="login.html">Already have an account? Login</a>
            </div>
        </div>
    </div>

    <script src="js/app-core.js"></script>
    <script>
        const role = localStorage.getItem('userRole') || 'student';
        
        if (role === 'student') {
            document.getElementById('roleText').innerHTML = '📚 Register as Student';
            document.getElementById('studentFields').style.display = 'block';
            document.getElementById('teacherFields').style.display = 'none';
        } else {
            document.getElementById('roleText').innerHTML = '👩‍🏫 Register as Teacher';
            document.getElementById('studentFields').style.display = 'none';
            document.getElementById('teacherFields').style.display = 'block';
        }
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            // Build form data
            const payload = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password,
                role,
                stream: role === 'student' && document.getElementById('stream') ? document.getElementById('stream').value : '',
                gender: role === 'student' && document.getElementById('gender') ? document.getElementById('gender').value : '',
                age: role === 'student' && document.getElementById('age') ? document.getElementById('age').value : '0',
                phone: '',
                subject: role === 'teacher' && document.getElementById('subject') ? document.getElementById('subject').value.trim() : '',
                attendance: '0',
                studyHours: '0',
                assignmentScore: '0'
            };

            try {
                await apiPostForm('/register', payload);

                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
            } catch (error) {
                alert(error.message || 'Cannot reach backend server. Make sure Java backend is running on port 8080');
            }
        });
    </script>
</body>
</html>
